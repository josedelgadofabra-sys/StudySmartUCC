{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudySmart</title>

<link rel="stylesheet" href="{% static 'css/styles.css' %}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">

<div class="container-fluid px-5">

    <!-- LOGO -->

    <a class="navbar-brand d-flex align-items-center" href="{% url 'lista_productos' %}">
        <img src="{% static 'img/logo.png' %}" height="55" class="me-3">
        <span class="fw-bold fs-4">StudySmart</span>
    </a>

    <!-- MOBILE -->

    <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav">

        <span class="navbar-toggler-icon"></span>

    </button>
    
    <!-- MENU -->

    <div class="collapse navbar-collapse justify-content-center"
        id="navbarNav">

        <ul class="navbar-nav gap-4 align-items-center">

            <li class="nav-item">
                <a class="nav-link active" href="{% url 'lista_productos' %}">
                    <i class="bi bi-house-door-fill text-primary"></i>
                    Inicio
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'materias' %}">
                    <i class="bi bi-book text-success"></i>
                    Materias
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'tareas' %}">
                    <i class="bi bi-clipboard-check text-purple"></i>
                    Tareas
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'planificador' %}">
                    <i class="bi bi-calendar-event text-warning"></i>
                    Planificador
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'pomodoro' %}">
                    <i class="bi bi-stopwatch text-danger"></i>
                    Pomodoro
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'estadisticas' %}">
                    <i class="bi bi-bar-chart text-info"></i>
                    Estadísticas
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'perfil' %}">
                    <i class="bi bi-person text-dark"></i>
                    Perfil
                </a>
            </li>

            <li class="nav-item">
                <a class="btn btn-outline-danger px-3"
                    href="{% url 'logout' %}">
                    <i class="bi bi-box-arrow-right"></i>
                    Salir
                </a>
            </li>

        </ul>

    </div>

</div>

</nav>

<!-- CONTENIDO -->

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% if messages %}
<script>

    {% for message in messages %}

        Swal.fire({
            toast:true,
            position:'top-end',
            icon:'success',
            title:'{{ message }}',
            showConfirmButton:false,
            timer:2600,
            timerProgressBar:true
        });

    {% endfor %}

</script>
{% endif %}

</body>
</html>
