{% extends 'crud_app/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-4">
        <div class="card panel-card p-4">
            <div class="text-center mb-4">
                <img src="{% static 'img/logo.png' %}" style="height:64px; width:64px; object-fit:contain; margin-bottom:8px;">
                <h2 style="font-weight:800; letter-spacing:-0.03em; font-size:1.4rem;">Bienvenido de vuelta</h2>
                <p style="color:var(--text-muted); font-size:0.85rem;">Inicia sesión en StudySmart UCC</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label"> Usuario</label>
                    <input type="text" class="form-control" name="username" required placeholder="Tu nombre de usuario">
                </div>
                <div class="mb-3">
                    <label class="form-label"> Contraseña</label>
                    <div class="input-group">
                        <input type="password" class="form-control" name="password" id="loginPassword" required placeholder="Tu contraseña">
                        <button type="button" class="btn btn-outline-secondary" id="toggleLoginPass" style="border-left:none;">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100 mb-3">
                    <span></span> Ingresar
                </button>
                <p class="text-center mb-0" style="font-size:0.85rem; color:var(--text-muted);">
                    ¿No tienes cuenta? <a href="{% url 'register' %}" style="color:var(--accent-blue); font-weight:600;">Regístrate aquí</a>
                </p>
            </form>
        </div>
    </div>
</div>

<script>
const loginPass = document.getElementById('loginPassword');
const toggleLoginPass = document.getElementById('toggleLoginPass');
toggleLoginPass.addEventListener('click', function () {
    const type = loginPass.getAttribute('type') === 'password' ? 'text' : 'password';
    loginPass.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '🙈';
});
</script>
{% endblock %}
